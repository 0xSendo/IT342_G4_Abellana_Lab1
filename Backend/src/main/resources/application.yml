spring:
  application:
    name: internmatch

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/internmatch?useSSL=false&serverTimezone=Asia/Manila&allowPublicKeyRetrieval=true
    username: root
    password: internmatch
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ""
            client-secret: ""
            scope:
              - profile
              - email

server:
  port: 8080

logging:
  level:
    root: DEBUG
    org.springframework: DEBUG
    org.hibernate: DEBUG

app:
  frontend-url: http://localhost:5173
